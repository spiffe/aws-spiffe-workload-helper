name: Test
on:
  pull_request: {}
  push:
    branches:
      - main

env:
  HELM_VERSION: v3.16.2
  KIND_VERSION: v0.31.0
  K8S_VERSION: v1.35.0

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          args: --exclude-dirs=vendoredaws
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Run Tests
        run: go test -v -race -shuffle=on -coverprofile=coverage.txt ./...

  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        test:
          - minio-policy
          - minio-rolearn
          - radosgw
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Set up Helm
        uses: azure/setup-helm@v3.5
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Create kind ${{ env.K8S_VERSION }} cluster
        uses: helm/kind-action@v1.13.0
        with:
          version: ${{ env.KIND_VERSION }}
          node_image: kindest/node:${{ env.K8S_VERSION }}
          config: .github/kind/conf/kind-config.yaml
          verbosity: 1
      - name: Setup disk
        run: truncate -s 10G /tmp/ceph-disk1.img
      - name: Start disk
        run: sudo losetup -fP /tmp/ceph-disk1.img
      - name: Make it an mdarray
        run: sudo mdadm --create /dev/md0 --level=1 --raid-devices=2 /dev/loop0 missing
      - name: Setup services
        run: ./tests/jwt/${{ matrix.test }}/setup.sh
      - name: Run tests
        run: ./tests/jwt/${{ matrix.test }}/test.sh
